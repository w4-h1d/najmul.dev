<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Paper Scissors 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rock: #FF6B6B;
    --paper: #4ECDC4;
    --scissors: #FFE66D;
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #f0f0f0;
    --win: #6BCB77;
    --lose: #FF6B6B;
    --draw: #FFE66D;
    --glow-r: rgba(255,107,107,0.5);
    --glow-p: rgba(78,205,196,0.5);
    --glow-s: rgba(255,230,109,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
  }

  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.9; } }

  /* SCREENS */
  .screen {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .screen.hidden { display: none; }

  /* HEADER */
  .game-title {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2.5rem, 8vw, 5rem);
    text-align: center;
    background: linear-gradient(135deg, var(--rock), var(--paper), var(--scissors));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
    margin-bottom: 8px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .subtitle {
    font-size: 1rem;
    opacity: 0.6;
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* MODE SELECT */
  .mode-cards {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 32px;
  }

  .mode-card {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 24px;
    padding: 36px 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    min-width: 180px;
    position: relative;
    overflow: hidden;
  }
  .mode-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--paper), var(--accent));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .mode-card:hover::before, .mode-card.active::before { opacity: 0.1; }
  .mode-card:hover, .mode-card.active {
    border-color: var(--paper);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(78,205,196,0.3);
  }
  .mode-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
  .mode-title { font-family: 'Boogaloo', cursive; font-size: 1.4rem; margin-bottom: 4px; }
  .mode-desc { font-size: 0.8rem; opacity: 0.6; }

  /* BUTTONS */
  .btn {
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
    padding: 14px 40px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 1px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #c62a47);
    color: #fff;
    box-shadow: 0 6px 20px rgba(233,69,96,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,69,96,0.5); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-secondary:hover { background: var(--surface); }
  .btn-sm { font-size: 0.9rem; padding: 8px 20px; }

  /* GAME SCREEN */
  .game-header {
    width: 100%; max-width: 800px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .back-btn {
    background: none; border: 1px solid rgba(255,255,255,0.2);
    color: var(--text); border-radius: 50px; padding: 8px 18px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .back-btn:hover { background: rgba(255,255,255,0.08); }

  .round-info {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    opacity: 0.7;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: flex; gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap; justify-content: center;
  }
  .score-card {
    background: var(--surface);
    border-radius: 18px;
    padding: 16px 28px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.07);
    min-width: 110px;
    position: relative;
  }
  .score-card.winner-glow { animation: pulse-win 0.6s ease; }
  @keyframes pulse-win { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 30px var(--win)} }

  .score-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.5;
    margin-bottom: 4px;
  }
  .score-value {
    font-family: 'Boogaloo', cursive;
    font-size: 2.2rem;
    line-height: 1;
  }
  .score-card.p1 .score-value { color: var(--paper); }
  .score-card.p2 .score-value { color: var(--rock); }
  .score-card.draw-s .score-value { color: var(--scissors); }

  /* ARENA */
  .arena {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .player-zone {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    min-width: 140px;
  }
  .player-name {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .choice-display {
    width: 120px; height: 120px;
    background: var(--surface);
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    border: 2px solid rgba(255,255,255,0.07);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .choice-display.revealed {
    animation: reveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes reveal {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .choice-display.win-glow { border-color: var(--win); box-shadow: 0 0 30px rgba(107,203,119,0.4); }
  .choice-display.lose-glow { border-color: var(--lose); box-shadow: 0 0 30px rgba(255,107,107,0.3); }
  .choice-display.draw-glow { border-color: var(--draw); box-shadow: 0 0 20px rgba(255,230,109,0.3); }

  .vs-badge {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(233,69,96,0.5);
  }

  /* RESULT BANNER */
  .result-banner {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    text-align: center;
    padding: 14px 40px;
    border-radius: 60px;
    margin-bottom: 24px;
    min-width: 260px;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-banner.show { opacity: 1; transform: scale(1); }
  .result-banner.win { background: linear-gradient(135deg, #3d9a4d, #6BCB77); color: #fff; box-shadow: 0 8px 30px rgba(107,203,119,0.4); }
  .result-banner.lose { background: linear-gradient(135deg, #c93535, #FF6B6B); color: #fff; box-shadow: 0 8px 30px rgba(255,107,107,0.4); }
  .result-banner.draw { background: linear-gradient(135deg, #b8962e, #FFE66D); color: #1a1a2e; box-shadow: 0 8px 30px rgba(255,230,109,0.4); }

  /* CHOICE BUTTONS */
  .choices {
    display: flex; gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .choice-btn {
    background: var(--surface);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-width: 100px;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::after {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.25s;
  }
  .choice-btn[data-choice="rock"]::after { background: radial-gradient(circle, var(--glow-r), transparent 70%); }
  .choice-btn[data-choice="paper"]::after { background: radial-gradient(circle, var(--glow-p), transparent 70%); }
  .choice-btn[data-choice="scissors"]::after { background: radial-gradient(circle, var(--glow-s), transparent 70%); }
  .choice-btn:hover::after { opacity: 0.5; }
  .choice-btn:hover { transform: translateY(-6px) scale(1.04); border-color: rgba(255,255,255,0.25); }
  .choice-btn[data-choice="rock"]:hover { border-color: var(--rock); }
  .choice-btn[data-choice="paper"]:hover { border-color: var(--paper); }
  .choice-btn[data-choice="scissors"]:hover { border-color: var(--scissors); }
  .choice-btn:active { transform: translateY(-2px) scale(0.98); }
  .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .choice-btn .emoji { font-size: 2.5rem; position: relative; z-index: 1; }
  .choice-btn .label {
    font-family: 'Boogaloo', cursive;
    font-size: 1rem; letter-spacing: 1px;
    position: relative; z-index: 1;
    text-transform: uppercase;
  }

  /* 2P TURN INDICATOR */
  .turn-indicator {
    text-align: center;
    margin-bottom: 16px;
    font-family: 'Boogaloo', cursive;
    font-size: 1.2rem;
  }
  .turn-indicator span {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 50px;
    background: var(--surface2);
  }
  .turn-indicator.p1-turn span { color: var(--paper); border: 1px solid var(--paper); }
  .turn-indicator.p2-turn span { color: var(--rock); border: 1px solid var(--rock); }

  /* P2 secret picks */
  .secret-pick {
    width: 100px; height: 100px;
    background: var(--surface2);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
    border: 2px dashed rgba(255,255,255,0.1);
  }

  /* HISTORY */
  .history-section {
    width: 100%; max-width: 800px;
    margin-top: 10px;
  }
  .history-title {
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .history-list {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    max-height: 80px; overflow: hidden;
  }
  .history-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 0.8rem;
    display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(255,255,255,0.05);
    animation: pop 0.3s ease;
  }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
  .history-item.w { border-color: rgba(107,203,119,0.3); }
  .history-item.l { border-color: rgba(255,107,107,0.3); }
  .history-item.d { border-color: rgba(255,230,109,0.3); }

  /* STATS SCREEN */
  .stats-container {
    width: 100%; max-width: 700px;
    background: var(--surface);
    border-radius: 28px;
    padding: 32px;
    border: 1px solid rgba(255,255,255,0.07);
    margin-top: 16px;
  }
  .stats-title {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 28px;
    color: var(--paper);
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--bg);
    border-radius: 18px;
    padding: 18px 12px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Boogaloo', cursive;
    font-size: 2.5rem;
    margin-bottom: 4px;
  }
  .stat-lbl { font-size: 0.75rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

  .bar-chart { margin-bottom: 20px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-name { font-size: 1.2rem; width: 30px; text-align: center; }
  .bar-track { flex: 1; background: var(--bg); border-radius: 50px; height: 12px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 50px;
    transition: width 1s ease;
  }
  .bar-fill.rock { background: var(--rock); }
  .bar-fill.paper { background: var(--paper); }
  .bar-fill.scissors { background: var(--scissors); }
  .bar-count { font-size: 0.85rem; opacity: 0.6; width: 24px; text-align: right; }

  .streak-display {
    text-align: center;
    margin-bottom: 20px;
    font-size: 0.95rem;
    opacity: 0.7;
  }
  .streak-val { font-family: 'Boogaloo', cursive; font-size: 1.5rem; color: var(--scissors); }

  /* NAV TABS */
  .nav-tabs {
    display: flex; gap: 8px; margin-bottom: 28px; justify-content: center; flex-wrap: wrap;
  }
  .tab-btn {
    font-family: 'Boogaloo', cursive;
    font-size: 1rem;
    padding: 8px 22px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* CONFETTI CANVAS */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* COUNTDOWN */
  .countdown {
    font-family: 'Boogaloo', cursive;
    font-size: 5rem;
    color: var(--accent);
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 40px rgba(233,69,96,0.6);
  }
  .countdown.show {
    animation: countAnim 0.5s ease-out forwards;
  }
  @keyframes countAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(2); }
    80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  }

  /* RESPONSIVE */
  @media (max-width: 520px) {
    .arena { gap: 16px; }
    .choice-display { width: 90px; height: 90px; font-size: 3rem; }
    .choices { gap: 12px; }
    .choice-btn { min-width: 80px; padding: 14px 16px; }
    .choice-btn .emoji { font-size: 2rem; }
    .scoreboard { gap: 10px; }
    .score-card { padding: 12px 18px; min-width: 90px; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="stars" id="stars"></div>
<div class="countdown" id="countdown"></div>

<!-- HOME SCREEN -->
<div class="screen" id="screen-home">
  <div class="game-title">✊ ✋ ✌️</div>
  <div class="game-title" style="margin-top:-20px">Rock Paper Scissors</div>
  <div class="subtitle">choose your fate</div>

  <div class="mode-cards">
    <div class="mode-card active" id="card-single" onclick="selectMode('single')">
      <span class="mode-icon">🤖</span>
      <div class="mode-title">vs CPU</div>
      <div class="mode-desc">Solo challenge</div>
    </div>
    <div class="mode-card" id="card-two" onclick="selectMode('two')">
      <span class="mode-icon">👥</span>
      <div class="mode-title">2 Players</div>
      <div class="mode-desc">Pass & play</div>
    </div>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary" onclick="startGame()">▶ Start Game</button>
    <button class="btn btn-secondary" onclick="showStats()">📊 Stats</button>
  </div>

  <div style="margin-top:20px;opacity:0.4;font-size:0.8rem">All-time record saved in your browser</div>
</div>

<!-- GAME SCREEN (Single Player) -->
<div class="screen hidden" id="screen-game">
  <div class="game-header" style="max-width:700px">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="round-info" id="round-display">Round 1</div>
    <button class="btn btn-secondary btn-sm" onclick="showStats()">📊 Stats</button>
  </div>

  <div class="scoreboard" id="scoreboard">
    <div class="score-card p1" id="sc-p1">
      <div class="score-label" id="label-p1">You</div>
      <div class="score-value" id="val-p1">0</div>
    </div>
    <div class="score-card draw-s">
      <div class="score-label">Draws</div>
      <div class="score-value" id="val-draw">0</div>
    </div>
    <div class="score-card p2">
      <div class="score-label" id="label-p2">CPU</div>
      <div class="score-value" id="val-p2">0</div>
    </div>
  </div>

  <div class="arena">
    <div class="player-zone">
      <div class="choice-display" id="display-p1">❓</div>
      <div class="player-name" id="pname-p1">YOU</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="player-zone">
      <div class="choice-display" id="display-p2">❓</div>
      <div class="player-name" id="pname-p2">CPU</div>
    </div>
  </div>

  <div class="result-banner" id="result-banner">—</div>

  <div class="turn-indicator hidden" id="turn-indicator">
    <span id="turn-text">Player 1's turn</span>
  </div>

  <div class="choices" id="choice-buttons">
    <button class="choice-btn" data-choice="rock" onclick="makeChoice('rock')">
      <span class="emoji">✊</span>
      <span class="label">Rock</span>
    </button>
    <button class="choice-btn" data-choice="paper" onclick="makeChoice('paper')">
      <span class="emoji">✋</span>
      <span class="label">Paper</span>
    </button>
    <button class="choice-btn" data-choice="scissors" onclick="makeChoice('scissors')">
      <span class="emoji">✌️</span>
      <span class="label">Scissors</span>
    </button>
  </div>

  <div id="next-btn-wrap" style="display:none;justify-content:center;margin-bottom:16px">
    <button class="btn btn-primary" onclick="nextRound()">Next Round ➜</button>
  </div>

  <div class="history-section">
    <div class="history-title">Match History</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<!-- STATS SCREEN -->
<div class="screen hidden" id="screen-stats">
  <button class="back-btn" onclick="goHome()" style="align-self:flex-start;margin-bottom:16px">← Back</button>
  <div class="stats-container">
    <div class="stats-title">📊 Your Stats</div>
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="switchStatTab('single')">vs CPU</button>
      <button class="tab-btn" onclick="switchStatTab('two')">2-Player</button>
    </div>
    <div id="stats-content"></div>
  </div>
</div>

<script>
// ===================== STATE =====================
let gameMode = 'single'; // 'single' | 'two'
let round = 1;
let scores = { p1: 0, p2: 0, draw: 0 };
let p1Choice = null;
let twoPlayerPhase = 'p1'; // 'p1' | 'p2' | 'reveal'
let gameActive = false;

const EMOJIS = { rock: '✊', paper: '✋', scissors: '✌️' };
const CHOICES = ['rock', 'paper', 'scissors'];

// ===================== STORAGE =====================
function loadStats() {
  const def = {
    single: { wins:0, losses:0, draws:0, total:0, streak:0, bestStreak:0, rock:0, paper:0, scissors:0 },
    two:    { p1wins:0, p2wins:0, draws:0, total:0, rock:0, paper:0, scissors:0 }
  };
  try {
    const s = JSON.parse(localStorage.getItem('rps_stats') || 'null');
    return s ? { single: {...def.single, ...s.single}, two: {...def.two, ...s.two} } : def;
  } catch { return def; }
}
function saveStats(s) {
  localStorage.setItem('rps_stats', JSON.stringify(s));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('rps_history') || '[]'); } catch { return []; }
}
function saveHistory(h) {
  localStorage.setItem('rps_history', JSON.stringify(h.slice(-50)));
}

// ===================== STARS =====================
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${0.1+Math.random()*0.5}`;
    c.appendChild(s);
  }
})();

// ===================== SCREENS =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goHome() {
  gameActive = false;
  showScreen('screen-home');
}

function selectMode(m) {
  gameMode = m;
  document.getElementById('card-single').classList.toggle('active', m==='single');
  document.getElementById('card-two').classList.toggle('active', m==='two');
}

// ===================== START GAME =====================
function startGame() {
  round = 1;
  scores = {p1:0, p2:0, draw:0};
  gameActive = true;
  resetRoundUI();
  updateScores();

  if (gameMode === 'single') {
    document.getElementById('label-p1').textContent = 'You';
    document.getElementById('label-p2').textContent = 'CPU';
    document.getElementById('pname-p1').textContent = 'YOU';
    document.getElementById('pname-p2').textContent = 'CPU';
    document.getElementById('turn-indicator').classList.add('hidden');
  } else {
    document.getElementById('label-p1').textContent = 'P1';
    document.getElementById('label-p2').textContent = 'P2';
    document.getElementById('pname-p1').textContent = 'PLAYER 1';
    document.getElementById('pname-p2').textContent = 'PLAYER 2';
    document.getElementById('turn-indicator').classList.remove('hidden');
    twoPlayerPhase = 'p1';
    updateTurnIndicator();
  }

  document.getElementById('history-list').innerHTML = '';
  showScreen('screen-game');
  document.getElementById('round-display').textContent = `Round ${round}`;
}

// ===================== GAME LOGIC =====================
function makeChoice(choice) {
  if (!gameActive) return;

  if (gameMode === 'single') {
    playSingle(choice);
  } else {
    playTwo(choice);
  }
}

function playSingle(choice) {
  disableButtons();
  const cpu = CHOICES[Math.floor(Math.random() * 3)];
  const result = getResult(choice, cpu);

  animateChoices(choice, cpu, () => {
    showResult(result, 'single');
    updateScoreForResult(result, 'single');
    updateStats(choice, result, 'single');
    addHistory(choice, cpu, result);
    showNextBtn();
  });
}

function playTwo(choice) {
  if (twoPlayerPhase === 'p1') {
    p1Choice = choice;
    twoPlayerPhase = 'p2';
    // Show secret for P1
    document.getElementById('display-p1').innerHTML = '🔒';
    document.getElementById('display-p1').classList.remove('revealed','win-glow','lose-glow','draw-glow');
    updateTurnIndicator();
  } else if (twoPlayerPhase === 'p2') {
    const p2Choice = choice;
    twoPlayerPhase = 'reveal';
    disableButtons();
    const result = getResult(p1Choice, p2Choice);

    animateChoices(p1Choice, p2Choice, () => {
      showResult(result, 'two');
      updateScoreForResult(result, 'two');
      updateStats(p1Choice, result, 'two');
      addHistory(p1Choice, p2Choice, result);
      showNextBtn();
    });
    document.getElementById('turn-indicator').classList.add('hidden');
  }
}

function updateTurnIndicator() {
  const ind = document.getElementById('turn-indicator');
  const txt = document.getElementById('turn-text');
  if (twoPlayerPhase === 'p1') {
    txt.textContent = "🟦 Player 1's Turn — Choose secretly!";
    ind.className = 'turn-indicator p1-turn';
  } else {
    txt.textContent = "🟥 Player 2's Turn — Choose secretly!";
    ind.className = 'turn-indicator p2-turn';
  }
}

function getResult(a, b) {
  if (a === b) return 'draw';
  if ((a==='rock'&&b==='scissors')||(a==='paper'&&b==='rock')||(a==='scissors'&&b==='paper')) return 'win';
  return 'lose';
}

function animateChoices(c1, c2, cb) {
  const d1 = document.getElementById('display-p1');
  const d2 = document.getElementById('display-p2');
  d1.textContent = '🤔'; d2.textContent = '🤔';

  let count = 3;
  const cd = document.getElementById('countdown');
  function tick() {
    if (count > 0) {
      cd.textContent = count;
      cd.className = 'countdown show';
      setTimeout(() => { cd.className = 'countdown'; }, 480);
      count--; setTimeout(tick, 500);
    } else {
      cd.className = 'countdown';
      d1.textContent = EMOJIS[c1]; d1.classList.add('revealed');
      d2.textContent = EMOJIS[c2]; d2.classList.add('revealed');
      setTimeout(cb, 200);
    }
  }
  tick();
}

function showResult(result, mode) {
  const d1 = document.getElementById('display-p1');
  const d2 = document.getElementById('display-p2');
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner';

  void banner.offsetWidth;

  if (mode === 'single') {
    if (result === 'win') {
      banner.textContent = '🎉 You Win!';
      banner.classList.add('show','win');
      d1.classList.add('win-glow'); d2.classList.add('lose-glow');
      launchConfetti();
    } else if (result === 'lose') {
      banner.textContent = '😢 CPU Wins!';
      banner.classList.add('show','lose');
      d1.classList.add('lose-glow'); d2.classList.add('win-glow');
    } else {
      banner.textContent = "🤝 It's a Draw!";
      banner.classList.add('show','draw');
      d1.classList.add('draw-glow'); d2.classList.add('draw-glow');
    }
  } else {
    if (result === 'win') {
      banner.textContent = '🎉 Player 1 Wins!';
      banner.classList.add('show','win');
      d1.classList.add('win-glow'); d2.classList.add('lose-glow');
      launchConfetti();
    } else if (result === 'lose') {
      banner.textContent = '🎉 Player 2 Wins!';
      banner.classList.add('show','lose');
      d1.classList.add('lose-glow'); d2.classList.add('win-glow');
    } else {
      banner.textContent = "🤝 It's a Draw!";
      banner.classList.add('show','draw');
      d1.classList.add('draw-glow'); d2.classList.add('draw-glow');
    }
  }
}

function updateScoreForResult(result, mode) {
  if (result === 'win') scores.p1++;
  else if (result === 'lose') scores.p2++;
  else scores.draw++;
  updateScores();
}

function updateScores() {
  document.getElementById('val-p1').textContent = scores.p1;
  document.getElementById('val-p2').textContent = scores.p2;
  document.getElementById('val-draw').textContent = scores.draw;
}

function nextRound() {
  round++;
  document.getElementById('round-display').textContent = `Round ${round}`;
  resetRoundUI();
  document.getElementById('next-btn-wrap').style.display = 'none';
  if (gameMode === 'two') {
    twoPlayerPhase = 'p1';
    updateTurnIndicator();
    document.getElementById('turn-indicator').classList.remove('hidden');
  }
}

function resetRoundUI() {
  const d1 = document.getElementById('display-p1');
  const d2 = document.getElementById('display-p2');
  d1.textContent = '❓'; d2.textContent = '❓';
  d1.className = 'choice-display'; d2.className = 'choice-display';
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner';
  enableButtons();
  p1Choice = null;
}

function showNextBtn() {
  document.getElementById('next-btn-wrap').style.display = 'flex';
}

function disableButtons() {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
}
function enableButtons() {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
}

// ===================== STATS =====================
function updateStats(choice, result, mode) {
  const s = loadStats();
  if (mode === 'single') {
    s.single.total++;
    s.single[choice]++;
    if (result === 'win') { s.single.wins++; s.single.streak++; s.single.bestStreak = Math.max(s.single.streak, s.single.bestStreak); }
    else if (result === 'lose') { s.single.losses++; s.single.streak = 0; }
    else { s.single.draws++; }
  } else {
    s.two.total++;
    s.two[choice]++;
    if (result === 'win') s.two.p1wins++;
    else if (result === 'lose') s.two.p2wins++;
    else s.two.draws++;
  }
  saveStats(s);
}

function addHistory(c1, c2, result) {
  const h = loadHistory();
  const label = result === 'win' ? 'W' : result === 'lose' ? 'L' : 'D';
  h.push({ c1, c2, result, label, ts: Date.now() });
  saveHistory(h);

  const list = document.getElementById('history-list');
  const item = document.createElement('div');
  item.className = `history-item ${result==='win'?'w':result==='lose'?'l':'d'}`;
  item.innerHTML = `${EMOJIS[c1]} <span style="opacity:.4">vs</span> ${EMOJIS[c2]} <b style="color:${result==='win'?'var(--win)':result==='lose'?'var(--lose)':'var(--draw)'}">${label}</b>`;
  list.prepend(item);
  const items = list.querySelectorAll('.history-item');
  if (items.length > 12) items[items.length-1].remove();
}

// ===================== STATS SCREEN =====================
let currentStatTab = 'single';
function showStats() {
  renderStats(currentStatTab);
  showScreen('screen-stats');
}
function switchStatTab(t) {
  currentStatTab = t;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&t==='single')||(i===1&&t==='two'));
  });
  renderStats(t);
}

  const s = loadStats();
  const c = document.getElementById('stats-content');

    const st = s.single;
    const total = st.total || 1;
    const wr = st.total ? Math.round(st.wins/st.total*100) : 0;

    c.innerHTML = `
      <div class="stats-grid">

        <div class="stat-box"><div class="stat-num" style="color:var(--paper)">${wr}%</div><div class="stat-lbl">Win Rate</div></div>
      </div>
      <div class="streak-display">Current streak: <span class="streak-val">${st.streak} 🔥</span> &nbsp;|&nbsp; Best: <span class="streak-val">${st.bestStreak} ⭐</span></div>
      <div class="bar-chart">

          <span class="bar-count">${st.rock}</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">✋</span>
          <div class="bar-track"><div class="bar-fill paper" style="width:${Math.round(st.paper/maxPick*100)}%"></div></div>
          <span class="bar-count">${st.paper}</span>
        </div>
        <div class="bar-row">
          <span class="bar-name">✌️</span>
          <div class="bar-track"><div class="bar-fill scissors" style="width:${Math.round(st.scissors/maxPick*100)}%"></div></div>
          <span class="bar-count">${st.scissors}</span>

      <div style="text-align:center;margin-top:8px">

      </div>
    `;
  } else {
    const st = s.two;
    const maxPick = Math.max(st.rock, st.paper, st.scissors, 1);
    const total = st.total || 1;
    c.innerHTML = `
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--paper)">${st.p1wins}</div><div class="stat-lbl">P1 Wins</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--rock)">${st.p2wins}</div><div class="stat-lbl">P2 Wins</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--draw)">${st.draws}</div><div class="stat-lbl">Draws</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--scissors)">${st.total}</div><div class="stat-lbl">Rounds</div></div>
      </div>
      <div class="bar-chart">
        <div style="font-size:.75rem;opacity:.5;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px">P1 Picks</div>

          <span class="bar-name">✊</span>

        </div>

          <span class="bar-name">✋</span>

          <span class="bar-name">✌️</span>

// ===================== CONFETTI =====================
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#6BCB77','#e94560','#fff'];

  for (let i = 0; i < 100; i++) {
    particles.push({
      x: Math.random() * canvas.width, y: -10,
      vx: (Math.random()-0.5)*4, vy: 3+Math.random()*4,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: 6+Math.random()*8, rot: Math.random()*360,
      rotV: (Math.random()-0.5)*8, alpha: 1
    });
  }

  let frame;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.alpha <= 0) return;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      if (p.y > canvas.height * 0.8) p.alpha -= 0.04;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
  setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); }, 3000);
}
